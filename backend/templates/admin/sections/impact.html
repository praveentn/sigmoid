{% if toast is defined %}<div data-toast="{{ toast }}" style="display:none"></div>{% endif %}
<div class="a-section-header">
  <span class="a-section-count">{{ items|length }} metrics</span>
  <button class="a-btn-add" onclick="toggleAddForm()">+ Add</button>
</div>
<div id="add-form" class="a-add-form">
  <form hx-post="/admin/section/impact" hx-target="#section-content" hx-swap="innerHTML">
    <div class="a-row a-row-3">
      <div class="a-field"><label class="a-label">Metric (e.g. 30+)</label><input class="a-input" name="metric" required placeholder="30+" /></div>
      <div class="a-field"><label class="a-label">Label</label><input class="a-input" name="label" required placeholder="Enterprise AI Solutions" /></div>
      <div class="a-field"><label class="a-label">Order</label><input class="a-input" name="order" type="number" value="{{ items|length + 1 }}" /></div>
    </div>
    <div class="a-field"><label class="a-label">Description (shown on hover)</label><input class="a-input" name="description" /></div>
    <div class="a-form-actions">
      <button type="submit" class="a-btn a-btn-save">Save</button>
      <button type="button" class="a-btn a-btn-cancel" onclick="toggleAddForm()">Cancel</button>
    </div>
  </form>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
{% for item in items %}
<div id="imp-{{ item.id }}" class="a-card">
  <div class="a-card-header">
    <div>
      <div style="font-size:1.6rem;font-weight:900;color:white;line-height:1">{{ item.metric }}</div>
      <div class="a-card-title" style="margin-top:.25rem">{{ item.label }}</div>
      <div class="a-card-sub">{{ item.description }}</div>
    </div>
    <div class="a-card-actions">
      <button class="a-btn a-btn-edit" onclick="toggleEdit('imp-{{ item.id }}')">Edit</button>
      <form style="display:inline" hx-post="/admin/section/impact/{{ item.id }}/delete" hx-target="#section-content" hx-swap="innerHTML" hx-confirm="Delete?">
        <button type="submit" class="a-btn a-btn-delete">Delete</button>
      </form>
    </div>
  </div>
  <div id="edit-imp-{{ item.id }}" class="a-edit-form" style="display:none">
    <form hx-post="/admin/section/impact/{{ item.id }}" hx-target="#section-content" hx-swap="innerHTML">
      <div class="a-row a-row-3">
        <div class="a-field"><label class="a-label">Metric</label><input class="a-input" name="metric" value="{{ item.metric }}" required /></div>
        <div class="a-field"><label class="a-label">Label</label><input class="a-input" name="label" value="{{ item.label }}" required /></div>
        <div class="a-field"><label class="a-label">Order</label><input class="a-input" name="order" type="number" value="{{ item.order }}" /></div>
      </div>
      <div class="a-field"><label class="a-label">Description</label><input class="a-input" name="description" value="{{ item.description or '' }}" /></div>
      <div class="a-form-actions">
        <button type="submit" class="a-btn a-btn-save">Save</button>
        <button type="button" class="a-btn a-btn-cancel" onclick="toggleEdit('imp-{{ item.id }}')">Cancel</button>
      </div>
    </form>
  </div>
</div>
{% endfor %}
</div>
<script>
function toggleAddForm(){document.getElementById('add-form').classList.toggle('open')}
function toggleEdit(id){const f=document.getElementById('edit-'+id);f.style.display=f.style.display==='none'?'block':'none'}
</script>
