{% extends "base.html" %}
{% block title %}Admin Login — Praveen T N{% endblock %}

{% block body %}
<div class="admin-login">
  <div class="login-box">
    <div class="login-header">
      <p class="pre">Admin Access</p>
      <h1>Sign In</h1>
      <p>Praveen T N &mdash; Portfolio CMS</p>
    </div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login">
      <div class="a-field">
        <label class="a-label">Username</label>
        <input class="a-input" type="text" name="username" placeholder="admin" required autofocus />
      </div>
      <div class="a-field">
        <label class="a-label">Password</label>
        <input class="a-input" type="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;justify-content:center;">
        Sign In
      </button>
    </form>

    <a href="/" class="login-back">&larr; Back to portfolio</a>
  </div>
</div>
{% endblock %}
