{% if toast is defined %}<div data-toast="{{ toast }}" style="display:none"></div>{% endif %}
<div class="a-section-header">
  <span class="a-section-count">{{ items|length }} entries</span>
  <button class="a-btn-add" onclick="toggleAddForm()">+ Add</button>
</div>
<div id="add-form" class="a-add-form">
  <form hx-post="/admin/section/education" hx-target="#section-content" hx-swap="innerHTML">
    <div class="a-row a-row-2">
      <div class="a-field"><label class="a-label">Institution</label><input class="a-input" name="institution" required /></div>
      <div class="a-field"><label class="a-label">Degree</label><input class="a-input" name="degree" required /></div>
      <div class="a-field"><label class="a-label">Year</label><input class="a-input" name="year" /></div>
      <div class="a-field"><label class="a-label">Order</label><input class="a-input" name="order" type="number" value="{{ items|length + 1 }}" /></div>
    </div>
    <div class="a-field"><label class="a-label">Description</label><textarea class="a-textarea" name="description" style="min-height:60px"></textarea></div>
    <div class="a-form-actions">
      <button type="submit" class="a-btn a-btn-save">Save</button>
      <button type="button" class="a-btn a-btn-cancel" onclick="toggleAddForm()">Cancel</button>
    </div>
  </form>
</div>
{% for item in items %}
<div id="edu-{{ item.id }}" class="a-card">
  <div class="a-card-header">
    <div>
      <div class="a-card-title">{{ item.degree }}</div>
      <div class="a-card-sub">{{ item.institution }} &middot; {{ item.year }}</div>
    </div>
    <div class="a-card-actions">
      <button class="a-btn a-btn-edit" onclick="toggleEdit('edu-{{ item.id }}')">Edit</button>
      <form style="display:inline" hx-post="/admin/section/education/{{ item.id }}/delete" hx-target="#section-content" hx-swap="innerHTML" hx-confirm="Delete?">
        <button type="submit" class="a-btn a-btn-delete">Delete</button>
      </form>
    </div>
  </div>
  <div id="edit-edu-{{ item.id }}" class="a-edit-form" style="display:none">
    <form hx-post="/admin/section/education/{{ item.id }}" hx-target="#section-content" hx-swap="innerHTML">
      <div class="a-row a-row-2">
        <div class="a-field"><label class="a-label">Institution</label><input class="a-input" name="institution" value="{{ item.institution }}" required /></div>
        <div class="a-field"><label class="a-label">Degree</label><input class="a-input" name="degree" value="{{ item.degree }}" required /></div>
        <div class="a-field"><label class="a-label">Year</label><input class="a-input" name="year" value="{{ item.year or '' }}" /></div>
        <div class="a-field"><label class="a-label">Order</label><input class="a-input" name="order" type="number" value="{{ item.order }}" /></div>
      </div>
      <div class="a-field"><label class="a-label">Description</label><textarea class="a-textarea" name="description">{{ item.description or '' }}</textarea></div>
      <div class="a-form-actions">
        <button type="submit" class="a-btn a-btn-save">Save</button>
        <button type="button" class="a-btn a-btn-cancel" onclick="toggleEdit('edu-{{ item.id }}')">Cancel</button>
      </div>
    </form>
  </div>
</div>
{% endfor %}
<script>
function toggleAddForm(){document.getElementById('add-form').classList.toggle('open')}
function toggleEdit(id){const f=document.getElementById('edit-'+id);f.style.display=f.style.display==='none'?'block':'none'}
</script>
